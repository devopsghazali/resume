<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-label="Terraform multi environment automation">
  <defs>
    <linearGradient id="tfBg" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f2430"/>
      <stop offset="100%" stop-color="#2b3548"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#tfBg)"/>
  <text x="60" y="68" fill="#f3f7ff" font-family="Arial" font-size="32" font-weight="700">Terraform AWS Multi-Environment Automation</text>
  <text x="60" y="98" fill="#c0d1ef" font-family="Arial" font-size="16">Reusable modules for dev, staging, and production</text>

  <rect x="70" y="145" width="260" height="100" rx="12" fill="#2e3a50" stroke="#8db4ff"/>
