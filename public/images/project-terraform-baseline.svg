  <rect x="380" y="305" width="200" height="90" rx="12" fill="#2f3a53" stroke="#9bbcff"/>
  <text x="480" y="358" text-anchor="middle" fill="#eef5ff" font-family="Arial" font-size="22">Staging</text>

  <rect x="640" y="305" width="200" height="90" rx="12" fill="#2f3a53" stroke="#9bbcff"/>
  <text x="740" y="358" text-anchor="middle" fill="#eef5ff" font-family="Arial" font-size="22">Production</text>

  <line x1="330" y1="195" x2="360" y2="195" stroke="#b7d1ff" stroke-width="4"/>
  <line x1="610" y1="195" x2="640" y2="195" stroke="#b7d1ff" stroke-width="4"/>
  <line x1="485" y1="245" x2="220" y2="305" stroke="#b7d1ff" stroke-width="3"/>
  <line x1="485" y1="245" x2="480" y2="305" stroke="#b7d1ff" stroke-width="3"/>
  <line x1="485" y1="245" x2="740" y2="305" stroke="#b7d1ff" stroke-width="3"/>

  <text x="480" y="475" text-anchor="middle" fill="#d8e5ff" font-family="Arial" font-size="18">Single codebase, environment-wise variables, safe infrastructure lifecycle</text>
