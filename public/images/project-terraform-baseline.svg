  <rect x="640" y="145" width="250" height="100" rx="12" fill="#3a4f72" stroke="#aacdff"/>
  <text x="765" y="190" text-anchor="middle" fill="#f0f5ff" font-family="Arial" font-size="22">AWS Resources</text>

  <rect x="120" y="305" width="200" height="90" rx="12" fill="#2f3a53" stroke="#9bbcff"/>
