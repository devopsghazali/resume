  <text x="124" y="662" fill="#A5F3FC" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Docker Compose</text>
  <rect x="280" y="636" width="146" height="40" rx="20" fill="rgba(96,165,250,0.14)"/>
  <text x="320" y="662" fill="#BFDBFE" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Kubernetes</text>
  <rect x="444" y="636" width="118" height="40" rx="20" fill="rgba(255,255,255,0.06)"/>
  <text x="470" y="662" fill="#E5E7EB" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Flask</text>
  <rect x="580" y="636" width="138" height="40" rx="20" fill="rgba(255,255,255,0.06)"/>
  <text x="606" y="662" fill="#E5E7EB" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Nginx</text>
  <rect x="736" y="636" width="150" height="40" rx="20" fill="rgba(255,255,255,0.06)"/>
  <text x="764" y="662" fill="#E5E7EB" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">PostgreSQL</text>
