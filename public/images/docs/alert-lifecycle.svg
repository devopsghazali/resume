  <rect width="960" height="360" fill="#1a120b"/>
  <rect x="30" y="140" width="160" height="80" rx="10" fill="#3b2a1a" stroke="#f59e0b"/><text x="110" y="188" fill="#ffedd5" text-anchor="middle" font-family="Arial" font-size="15">Rule Triggered</text>
  <rect x="220" y="140" width="160" height="80" rx="10" fill="#3b2a1a" stroke="#f59e0b"/><text x="300" y="188" fill="#ffedd5" text-anchor="middle" font-family="Arial" font-size="15">Alertmanager</text>
  <rect x="410" y="140" width="160" height="80" rx="10" fill="#3b2a1a" stroke="#f59e0b"/><text x="490" y="188" fill="#ffedd5" text-anchor="middle" font-family="Arial" font-size="15">On-call Page</text>
  <rect x="600" y="140" width="160" height="80" rx="10" fill="#3b2a1a" stroke="#f59e0b"/><text x="680" y="188" fill="#ffedd5" text-anchor="middle" font-family="Arial" font-size="15">Acknowledge</text>
