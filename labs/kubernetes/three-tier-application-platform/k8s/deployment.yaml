apiVersion: apps/v1
kind: Deployment
metadata:
  name: three-tier-application-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: three-tier-application-platform
  template:
    metadata:
      labels:
        app: three-tier-application-platform
    spec:
      containers:
        - name: app
          image: devopsghazali/three-tier-application-platform:latest
          ports:
            - containerPort: 8080
